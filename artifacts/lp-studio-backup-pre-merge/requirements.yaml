packages:
  "recharts": "Required for displaying statistical results and conversion rate charts"
  "framer-motion": "Required for smooth page transitions and micro-interactions"
  "date-fns": "Required for formatting dates in the dashboard"
  "@hookform/resolvers": "Zod validation for forms"
  "react-hook-form": "Form state management"

images:
  - path: "artifacts/lp-studio/public/images/logo.png"
    description: "Minimal modern SaaS logo mark in deep indigo and slate, abstract geometric shape"
    aspect_ratio: "1:1"
  - path: "artifacts/lp-studio/public/images/empty-state.png"
    description: "Clean abstract 3D illustration of a test tube and data charts, soft pastel lighting, professional SaaS style"
    aspect_ratio: "4:3"

notes:
  - API endpoints are pre-generated via Orval in @workspace/api-client-react
  - Landing pages are served within the app at /lp/:slug
  - Session IDs for A/B testing are generated via crypto.randomUUID() and stored in localStorage
