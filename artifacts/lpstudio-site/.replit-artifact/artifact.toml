kind = "web"
previewPath = "/lpstudio-site/"
title = "LP Studio Marketing Site"
version = "1.0.0"
id = "artifacts/lpstudio-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/lpstudio-site/" ]
localPort = 25733

[services.development]
run = "pnpm --filter @workspace/lpstudio-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lpstudio-site", "run", "build" ]
publicDir = "artifacts/lpstudio-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25733"
BASE_PATH = "/lpstudio-site/"
