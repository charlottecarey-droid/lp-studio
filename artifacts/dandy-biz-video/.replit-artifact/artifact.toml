kind = "video"
previewPath = "/dandy-biz-video/"
title = "Dandy Insights — Business Leadership 30s"
version = "1.0.0"
id = "artifacts/dandy-biz-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dandy-biz-video/" ]
localPort = 21012

[services.development]
run = "pnpm --filter @workspace/dandy-biz-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dandy-biz-video", "run", "build" ]
publicDir = "artifacts/dandy-biz-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21012"
BASE_PATH = "/dandy-biz-video/"
