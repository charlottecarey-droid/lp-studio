kind = "video"
previewPath = "/dandy-lab-video-2/"
title = "Dandy Website animation"
version = "1.0.0"
id = "artifacts/dandy-lab-video-2"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dandy-lab-video-2/" ]
localPort = 22193

[services.development]
run = "pnpm --filter @workspace/dandy-lab-video-2 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dandy-lab-video-2", "run", "build" ]
publicDir = "artifacts/dandy-lab-video-2/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22193"
BASE_PATH = "/dandy-lab-video-2/"
