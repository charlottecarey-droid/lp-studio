<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>LP Studio</title>
    <meta name="description" content="LP Studio — build, test, and optimize high-converting landing pages for your sales team." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lpstudio.ai" />
    <meta property="og:title" content="LP Studio" />
    <meta property="og:description" content="Build, test, and optimize high-converting landing pages for your sales team." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Domain-specific metadata: swap title/OG tags per domain -->
    <script>
      (function () {
        var h = location.hostname;
        var sel = function (s) { return document.querySelector(s); };
        var set = function (el, v) { if (el) el.setAttribute('content', v); };
        if (h === 'ent.meetdandy.com') {
          document.title = 'Dandy — LP Studio';
          set(sel('meta[name="description"]'),       'Dandy LP Studio — personalized landing pages for dental practices.');
          set(sel('meta[property="og:title"]'),      'Dandy — LP Studio');
          set(sel('meta[property="og:description"]'),'Personalized landing pages for dental practices, powered by Dandy.');
          set(sel('meta[property="og:url"]'),        'https://ent.meetdandy.com');
        } else if (h === 'partners.meetdandy.com') {
          document.title = 'Dandy';
          set(sel('meta[name="description"]'),       'See what Dandy can do for your dental practice.');
          set(sel('meta[property="og:title"]'),      'Dandy');
          set(sel('meta[property="og:description"]'),'See what Dandy can do for your dental practice.');
          set(sel('meta[property="og:url"]'),        'https://partners.meetdandy.com');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
