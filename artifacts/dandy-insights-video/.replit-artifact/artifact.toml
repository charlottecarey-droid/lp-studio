kind = "video"
previewPath = "/dandy-insights-video/"
title = "Dandy Insights — 30s Product Video"
version = "1.0.0"
id = "artifacts/dandy-insights-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dandy-insights-video/" ]
localPort = 22714

[services.development]
run = "pnpm --filter @workspace/dandy-insights-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dandy-insights-video", "run", "build" ]
publicDir = "artifacts/dandy-insights-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22714"
BASE_PATH = "/dandy-insights-video/"
